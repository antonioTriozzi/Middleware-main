spring.application.name=testMiddleware

# Porta distinta dalla web app (tipicamente 8080) così gateway e test REST non si pestano i piedi.
server.port=8081
spring.datasource.url=jdbc:mysql://localhost:3306/testtesi
spring.datasource.username=testiUserDb
spring.datasource.password=userdb
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurazione JPA/Hibernate per il DB principale
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.security.user.name=admin
spring.security.user.password=admin

# Bootstrap admin user (persistito su tabella `user` all'avvio se mancante)
app.bootstrap.admin.username=admin
app.bootstrap.admin.password=AdminPass123!
app.bootstrap.admin.email=admin@example.com

# Realtime: false = solo lettura ultimo DatoSensore (valori dal JSON ingest). true = demo con numeri casuali + scrittura DB.
app.realtime.simulate-readings=false

# Token condiviso col gateway IoT (header X-Gateway-Ingest-Token su POST /api/consumi). Vuoto = solo JWT.
app.gateway-ingest.secret=dev-gateway-ingest-secret

#
# Outbox → push verso app web (nuovi utenti: gateway consumi, Android /api/userdata/save, OTP se creati).
# Stesso segreto di app.middleware-integration.secret sul progetto web (profilo dev).
app.web-sync.enabled=false
app.web-sync.base-url=http://localhost:8080
app.web-sync.path=/app/api/integration/middleware/client-upsert
app.web-sync.secret=
app.web-sync.interval-ms=60000