spring.application.name=testMiddleware

spring.datasource.url=jdbc:mysql://localhost:3306/testtesi
spring.datasource.username=testiUserDb
spring.datasource.password=userdb
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurazione JPA/Hibernate per il DB principale
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.security.user.name=admin
spring.security.user.password=admin

# Bootstrap admin user (persistito su tabella `user` all'avvio se mancante)
app.bootstrap.admin.username=admin
app.bootstrap.admin.password=AdminPass123!
app.bootstrap.admin.email=admin@example.com

# Realtime: false = solo lettura ultimo DatoSensore (valori dal JSON ingest). true = demo con numeri casuali + scrittura DB.
app.realtime.simulate-readings=false

#
# Outbox sync utenti:
# alla prima registrazione/login OTP il middleware inserisce un record in tabella `user_sync_outbox` (status=PENDING)
# che può essere consumato da un servizio esterno.
#
# Push verso app web (POST .../app/api/integration/middleware/client-upsert):
# Stesso segreto di app.middleware-integration.secret sulla web + integration enabled sulla web.
app.web-sync.enabled=true
app.web-sync.base-url=http://localhost:8090
app.web-sync.token=dev-middleware-web-sync-secret
# Opzionale: ID edificio (Building) sulla web se User.idCondominio nel middleware è ancora null
app.web-sync.default-condominio-id=1

# Retry automatico push verso web usando user_sync_outbox (best-effort, non blocca login)
app.web-sync.outbox-retry.enabled=true
app.web-sync.outbox-retry.delay-ms=15000
app.web-sync.outbox-retry.max-attempts=20