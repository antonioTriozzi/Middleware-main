spring.application.name=testMiddleware

# Porta distinta dalla web app (tipicamente 8080) così gateway e test REST non si pestano i piedi.
server.port=8081
# MySQL 8: schema dedicato al middleware (la web app usa di solito un altro DB, es. progetto_tesi).
# Controlla qui le tabelle `user`, `user_sync_outbox`, ecc. — non confonderle con il DB dell'app web.
spring.datasource.url=jdbc:mysql://localhost:3306/testtesi?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=superadmin2002@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurazione JPA/Hibernate per il DB principale
# Dialect esplicito: evita "Unable to determine Dialect without JDBC metadata" se MySQL non risponde subito
# o Hibernate non legge i metadati JDBC. Con Hibernate 6 usare MySQLDialect.
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.security.user.name=admin
spring.security.user.password=admin

# Bootstrap admin user (persistito su tabella `user` all'avvio se mancante)
app.bootstrap.admin.username=admin
app.bootstrap.admin.password=AdminPass123!
app.bootstrap.admin.email=admin@example.com

# Realtime: false = solo lettura ultimo DatoSensore (valori dal JSON ingest). true = demo con numeri casuali + scrittura DB.
app.realtime.simulate-readings=false

# --- Ingest gateway (POST /api/consumi): header X-Gateway-Ingest-Token ---
# Dev: stesso valore di GATEWAY_INGEST_SECRET nel .env del gateway (default: dev-gateway-ingest-secret).
# In prod: stringa lunga casuale. Se in IntelliJ imposti APP_GATEWAY_INGEST_SECRET vuota, rimuovila: svuota la property.
app.gateway-ingest.secret=dev-gateway-ingest-secret

# Stesso jwt.secret dell'app web (ProgettoTesi): consente POST /api/consumi con Authorization Bearer = REMOTE_CONFIG_TOKEN (admin web) dal gateway.
app.web-app.jwt.secret=0123456789012345678901234567890101234567890123456789012345678901

#
# Outbox sync utenti:
# alla prima registrazione/login OTP il middleware inserisce un record in tabella `user_sync_outbox` (status=PENDING)
# che può essere consumato da un servizio esterno.
#
# Push verso app web (POST .../app/api/integration/middleware/client-upsert):
# Stesso segreto di app.middleware-integration.secret sulla web + integration enabled sulla web.
app.web-sync.enabled=true
app.web-sync.base-url=http://localhost:8090
app.web-sync.token=dev-middleware-web-sync-secret
# Opzionale: ID edificio (Building) sulla web se User.idCondominio nel middleware è ancora null
app.web-sync.default-condominio-id=1

# Retry automatico push verso web usando user_sync_outbox (best-effort, non blocca login)
app.web-sync.outbox-retry.enabled=true
app.web-sync.outbox-retry.delay-ms=15000
app.web-sync.outbox-retry.max-attempts=20
